<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>虎のたましい人魚の涙</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Zen Kaku Gothic New',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* カード */

.card{

width:320px;
height:480px;

background:white;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:30px;

box-sizing:border-box;

position:relative;

}

/* ドット */

.dots{

position:absolute;

top:14px;

display:flex;

gap:6px;

}

.dot{

width:8px;

height:8px;

border-radius:50%;

background:#ddd;

}

.dot.active{

background:black;

}

/* テキスト */

.text{

font-size:20px;

line-height:1.6;

opacity:0;

transform:translateY(10px);

transition:.7s;

}

.text.show{

opacity:1;

transform:translateY(0);

}

.big{

font-size:24px;

font-weight:700;

}

.quote{

font-size:18px;

font-style:italic;

}

/* 書影 */

.book{

display:none;

flex-direction:column;

align-items:center;

}

.book img{

width:150px;

border-radius:6px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

.title{

margin-top:10px;

font-weight:700;

}

.author{

font-size:13px;

opacity:.6;

}

/* ボタン */

.button{

margin-top:12px;

padding:10px 18px;

border-radius:20px;

background:black;

color:white;

text-decoration:none;

font-size:13px;

font-weight:700;

}

/* 再生ボタン */

.replay{

margin-top:10px;

font-size:13px;

cursor:pointer;

opacity:.7;

}

.replay:hover{

opacity:1;

}

</style>

</head>

<body>

<div class="card">

<div class="dots" id="dots"></div>

<div id="text" class="text"></div>

<div id="book" class="book">

<img src="https://m.media-amazon.com/images/I/61HB2U1WHFL._SL1411_.jpg">

<div class="title">虎のたましい人魚の涙</div>

<div class="author">くどうれいん</div>

<a class="button"
href="https://aged-trouser-c00.notion.site/305f89d90a638091962ef074a4d62b50"
target="_blank">

感想記事を読む

</a>

<div class="replay" onclick="restartReel()">

▶ もう一度見る

</div>

</div>

</div>

<script>

const scenes=[

`<div class="big">働く日々のなかで<br>ふと心が動く瞬間</div>`,

`「このままでいいのかな」<br><br>そんな焦りを感じることがある`,

`<div class="quote">「特別になりたくて」<br>必死だった</div>`,

`会社で働きながら<br>作家活動をしていた頃の<br>くどうれいんの記録`,

`日常の喜びも<br>焦燥感も虚しさも<br>そのまま言葉にする`,

`<div class="big">愛おしい日々が<br>あなたの生活の中にも</div>`

]

let index=0

const text=document.getElementById("text")
const book=document.getElementById("book")
const dotsContainer=document.getElementById("dots")

let interval

/* ドット生成 */

scenes.forEach(()=>{

const dot=document.createElement("div")

dot.classList.add("dot")

dotsContainer.appendChild(dot)

})

const dots=document.querySelectorAll(".dot")

function updateDots(){

dots.forEach((d,i)=>{

d.classList.toggle("active",i<=index)

})

}

function showScene(){

if(index < scenes.length){

book.style.display="none"
text.style.display="block"

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML=scenes[index]

text.classList.add("show")

updateDots()

index++

},200)

}else{

text.style.display="none"
book.style.display="flex"

clearInterval(interval)

}

}

function restartReel(){

index=0

book.style.display="none"

interval=setInterval(showScene,5000)

showScene()

}

/* 初回再生 */

showScene()

interval=setInterval(showScene,5000)

</script>

</body>

</html>
