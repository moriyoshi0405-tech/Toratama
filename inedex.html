<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:transparent;
font-family:'Zen Kaku Gothic New',sans-serif;
display:flex;
justify-content:center;
align-items:center;
}

/* リールカード */

.card{

width:320px;
height:480px;
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
box-sizing:border-box;

}

/* テキスト */

.text{

font-size:20px;
line-height:1.6;
opacity:0;
transform:translateY(10px);
transition:.8s;

}

.text.show{
opacity:1;
transform:translateY(0);
}

.big{
font-size:24px;
font-weight:700;
}

.quote{
font-style:italic;
font-size:18px;
}

/* 書影 */

.book{

display:none;
flex-direction:column;
align-items:center;

}

.book img{

width:140px;
border-radius:6px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);

}

.title{
margin-top:10px;
font-weight:700;
}

.author{
font-size:13px;
opacity:.6;
}

/* ボタン */

.button{

margin-top:12px;
padding:10px 18px;
border-radius:20px;
background:black;
color:white;
text-decoration:none;
font-size:13px;
font-weight:700;

}

</style>
</head>

<body>

<div class="card">

<div id="text" class="text"></div>

<div id="book" class="book">

<img src="https://m.media-amazon.com/images/I/61HB2U1WHFL._SL1411_.jpg">

<div class="title">虎のたましい人魚の涙</div>
<div class="author">くどうれいん</div>

<a class="button" href="https://aged-trouser-c00.notion.site/305f89d90a638091962ef074a4d62b50" target="_blank">
感想記事を読む
</a>

</div>

</div>

<script>

const scenes=[

`<div class="big">働く日々のなかで<br>ふと虚しくなる瞬間</div>`,

`「このままでいいのかな」<br><br>
そんな焦りを感じることがある`,

`<div class="quote">
「特別になりたくて」<br>
必死だった
</div>`,

`会社で働きながら<br>
作家を目指していた頃の<br>
くどうれいんの記録`,

`日常の虚しさも<br>
焦燥感も喜びも<br>
そのまま言葉にする`,

`<div class="big">愛おしい日々が<br>あなたの生活の中にも</div>`

]

let index=0
const text=document.getElementById("text")
const book=document.getElementById("book")

function showScene(){

if(index < scenes.length){

book.style.display="none"
text.style.display="block"

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML=scenes[index]
text.classList.add("show")

index++

},200)

}else{

text.style.display="none"
book.style.display="flex"

}

}

showScene()

setInterval(showScene,3000)

</script>

</body>
</html>
